name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: LSP Build
        run: cargo build -p icvs-lsp --release

      - name: WASM Build
        working-directory: wasm
        run: wasm-pack build --target web --out-dir pkg

      - name: Python Build
        working-directory: py
        run: maturin build --release

      - name: CLI Smoke Tests
        run: |
          cargo run -- validate tests/fixtures/simple.icvs
          cargo run -- icvs-to-md tests/fixtures/simple.icvs > /dev/null
          cargo run -- convert tests/fixtures/simple.icvs --target json > /dev/null
          cargo run -- benchmark tests/fixtures/simple.icvs --iterations 10
